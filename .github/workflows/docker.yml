name: Build, Push & Deploy Backend

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kheyr-backend

jobs:
  build:
    name: Build and Push Docker Image
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "${IMAGE_NAME}:${IMAGE_TAG}" \
            -t "${IMAGE_NAME}:latest" \
            .

      - name: Push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${IMAGE_NAME}:latest"

  upload_firebase_secret:
    name: Upload Firebase Secret File to VPS
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Create firebase-service-account.json on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            mkdir -p /opt/portainer-stacks/kheyr-backend/secrets
            cat > /opt/portainer-stacks/kheyr-backend/secrets/firebase-service-account.json <<'FIREBASE_EOF'
            ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
            FIREBASE_EOF
            chmod 600 /opt/portainer-stacks/kheyr-backend/secrets/firebase-service-account.json

  deploy:
    name: Update Stack Reference and Trigger Portainer
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: upload_firebase_secret

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update docker-compose image tag
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|image: ghcr.io/.*/kheyr-backend:.*|image: ${IMAGE_NAME}:${IMAGE_TAG}|" docker-compose.yml
          grep -n 'image:' docker-compose.yml

      - name: Commit deployment tag update
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if git diff --quiet -- docker-compose.yml; then
            echo "docker-compose.yml already points to ${IMAGE_NAME}:${IMAGE_TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git commit -m "Deploy backend image ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main

      - name: Trigger Portainer Webhook
        run: |
          sleep 5
          curl \
            --fail \
            --show-error \
            --silent \
            -X POST \
            "${{ secrets.PORTAINER_WEBHOOK_URL }}"
