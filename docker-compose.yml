version: "3.9"

services:
  backend:
    image: ghcr.io/sina-morshedi/kheyr-backend:2f9e5bd50e0b5641d38b7a5fc0f6566b9370b5c0
    container_name: kheyr-backend
    restart: unless-stopped
    ports:
      - "8087:4000"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI}
      SERVER_PORT: 4000
    volumes:
      - /opt/portainer-stacks/kheyr-backend/secrets/firebase-service-account.json:/app/config/firebase-service-account.json:ro
    networks:
      - nanoelectronics-network

networks:
  nanoelectronics-network:
    external: true
